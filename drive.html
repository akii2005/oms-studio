<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMS Archive | الأرشيف</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Alexandria', sans-serif; background-color: #f0f2f5; transition: all 0.3s ease; }
        html[dir="ltr"] body { font-family: 'Playfair Display', serif; }
        .folder-card:hover { background-color: #e2e8f0; transform: translateY(-2px); }
    </style>
</head>
<body class="text-gray-800">

    <!-- قائمة الدرايف العلوية -->
    <nav class="bg-white px-6 py-4 flex justify-between items-center shadow-sm sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <a href="index.html" class="text-gray-500 hover:text-black transition p-2 bg-gray-100 rounded-full">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            </a>
            <h1 class="text-xl font-bold tracking-widest font-serif text-gray-800" style="font-family: 'Playfair Display', serif;">OMS Drive.</h1>
        </div>
        <button id="langToggle" class="text-xs font-bold bg-gray-900 text-white hover:bg-gray-700 px-4 py-2 rounded-full transition">EN</button>
    </nav>

    <!-- مساحة العمل والمجلدات -->
    <main class="max-w-7xl mx-auto px-6 py-10">
        
        <div class="flex items-center text-xl text-gray-800 mb-8 font-semibold">
            <span data-i18n="my_drive">ملفاتي</span>
            <span class="mx-2 text-gray-400">/</span>
            <span data-i18n="archive" class="text-gray-500 text-lg">الأرشيف الشامل</span>
        </div>

        <!-- المجلدات -->
        <h2 class="text-sm font-bold text-gray-500 mb-4" data-i18n="folders">المجلدات</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-12">
            
            <div class="folder-card bg-white p-4 rounded-xl border border-gray-200 flex items-center gap-4 cursor-pointer transition shadow-sm">
                <svg class="w-12 h-12 text-gray-400" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>
                <div>
                    <h3 class="font-bold text-sm text-gray-800" data-i18n="f_sports">بطولة كرة القدم </h3>
                    <p class="text-xs text-gray-400">Taman Seri Pulai</p>
                </div>
            </div>

            <div class="folder-card bg-white p-4 rounded-xl border border-gray-200 flex items-center gap-4 cursor-pointer transition shadow-sm">
                <svg class="w-12 h-12 text-gray-400" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>
                <div>
                    <h3 class="font-bold text-sm text-gray-800" data-i18n="f_cayan">إعلان كيان باك</h3>
                    <p class="text-xs text-gray-400" data-i18n="f_cayan_sub">Cayan Pack</p>
                </div>
            </div>

            <div class="folder-card bg-white p-4 rounded-xl border border-gray-200 flex items-center gap-4 cursor-pointer transition shadow-sm">
                <svg class="w-12 h-12 text-gray-400" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>
                <div>
                    <h3 class="font-bold text-sm text-gray-800" data-i18n="f_utm">تغطيات جامعية</h3>
                    <p class="text-xs text-gray-400">UTM Events</p>
                </div>
            </div>

            <div class="folder-card bg-white p-4 rounded-xl border border-gray-200 flex items-center gap-4 cursor-pointer transition shadow-sm">
                <svg class="w-12 h-12 text-gray-400" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>
                <div>
                    <h3 class="font-bold text-sm text-gray-800" data-i18n="f_mockup">نماذج المشاريع</h3>
                    <p class="text-xs text-gray-400" data-i18n="f_mockup_sub">Group Prototypes</p>
                </div>
            </div>
        </div>

        <!-- الملفات (الصور المباشرة) -->
        <h2 class="text-sm font-bold text-gray-500 mb-4" data-i18n="files">الملفات</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
            
            <div class="bg-white rounded-lg border border-gray-200 overflow-hidden hover:shadow-lg transition cursor-pointer">
                <div class="h-40 bg-gray-100"><img src="https://images.unsplash.com/photo-1518091043644-c1d4457512c6?q=80&w=400" class="w-full h-full object-cover"></div>
                <div class="p-3 flex items-center gap-2 border-t border-gray-100">
                    <div class="w-4 h-4 bg-red-500 rounded-sm flex-shrink-0"></div>
                    <p class="text-xs font-semibold text-gray-700 truncate" dir="ltr">IMG_5300_01.jpg</p>
                </div>
            </div>

            <div class="bg-white rounded-lg border border-gray-200 overflow-hidden hover:shadow-lg transition cursor-pointer">
                <div class="h-40 bg-gray-100"><img src="https://images.unsplash.com/photo-1600857544200-b2f666a9a2ec?q=80&w=400" class="w-full h-full object-cover"></div>
                <div class="p-3 flex items-center gap-2 border-t border-gray-100">
                    <div class="w-4 h-4 bg-blue-500 rounded-sm flex-shrink-0"></div>
                    <p class="text-xs font-semibold text-gray-700 truncate" dir="ltr">Product_Final.png</p>
                </div>
            </div>

        </div>
    </main>

    <script>
        const translations = {
            ar: {
                my_drive: "ملفاتي", archive: "الأرشيف الشامل", folders: "المجلدات", files: "الملفات",
                f_sports: "بطولة كرة القدم", f_cayan: "إعلان كيان باك", f_utm: "تغطيات جامعية", f_mockup: "نماذج المشاريع",
                f_cayan_sub: "منتجات", f_mockup_sub: "نماذج وأعمال جماعية"
            },
            en: {
                my_drive: "My Drive", archive: "Full Archive", folders: "Folders", files: "Files",
                f_sports: "Football Tournament", f_cayan: "Cayan Pack Ad", f_utm: "University Events", f_mockup: "Project Mockups",
                f_cayan_sub: "Products", f_mockup_sub: "Group works & prototypes"
            }
        };

        let currentLang = 'ar';
        const langToggleBtn = document.getElementById('langToggle');
        const htmlRoot = document.getElementById('html-root');

        langToggleBtn.addEventListener('click', () => {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            htmlRoot.setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');
            htmlRoot.setAttribute('lang', currentLang);
            langToggleBtn.innerText = currentLang === 'ar' ? 'EN' : 'عربي';

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key]) el.innerText = translations[currentLang][key];
            });
        });
    </script>
</body>
</html>
